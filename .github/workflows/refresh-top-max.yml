name: Refresh top DR & talent max

# Rebuilds the bundled "hypothetical max" reference datasets the Drop Rate
# and Talents pages compare against:
#   • web/lib/dropRate/topDropRate.ts       (+ .meta.ts)
#   • web/lib/talentsLevel/topTalents.ts
# Both collectors fetch every top player's raw save straight from the IT
# profiles endpoint (no browser needed — unlike the Tome refresh), run our
# corgan engine, and keep the best value of every source across players.

on:
  schedule:
    # Every 3 days at 04:00 UTC — offset an hour from refresh-top-players
    # (03:00) so the two don't hammer the IT endpoint at the same time.
    - cron: "0 4 */3 * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-top-max
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install npm dependencies
        working-directory: web
        run: npm ci

      - name: Refresh top-player Drop Rate max
        working-directory: web
        run: npx tsx scripts/update-top-dr.ts

      - name: Refresh top-player Talent max
        working-directory: web
        run: npx tsx scripts/update-top-talents.ts

      - name: Commit refreshed snapshots
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          files="web/lib/dropRate/topDropRate.ts web/lib/dropRate/topDropRate.meta.ts web/lib/talentsLevel/topTalents.ts"
          git add $files
          if git diff --cached --quiet; then
            echo "Snapshots unchanged, nothing to commit."
            exit 0
          fi
          git commit -m "chore: auto-refresh top DR + talent max snapshots"
          git push
