name: Refresh top players

on:
  schedule:
    - cron: "0 3 */3 * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-top-players
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install npm dependencies
        working-directory: web
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}

      - name: Install Playwright system deps
        working-directory: web
        run: npx playwright install-deps chromium

      - name: Install Playwright Chromium (if not cached)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: web
        run: npx playwright install chromium

      - name: Run scraper
        working-directory: web
        run: npx tsx scripts/update-top-players.ts

      - name: Commit refreshed snapshot
        env:
          GIT_AUTHOR_NAME: github-actions[bot]
          GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
          GIT_COMMITTER_NAME: github-actions[bot]
          GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
        run: |
          if git diff --quiet web/lib/tome/topPlayers.ts; then
            echo "Snapshot unchanged, nothing to commit."
            exit 0
          fi
          git add web/lib/tome/topPlayers.ts
          git commit -m "chore: auto-refresh top-player snapshot"
          git push
